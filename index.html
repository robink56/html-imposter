<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imposter Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>IMPOSTER</h1>
      <h2>Chor patta lagam hai</h2>
    </section>

    <section class="card">
      <label for="i1">Number of players</label>
      <input type="number" id="i1" min="2" placeholder="Enter number of players" />

      <label for="i2">Number of imposters</label>
      <input type="number" id="i2" value="1" readonly />

      <button id="btn1">Start Game</button>
    </section>

    <section class="card hidden" id="nameSection">
      <h3>Enter Player Names</h3>
      <div id="nameInputs"></div>
      <button id="createRolesBtn">Create Roles</button>
    </section>

    <section class="card hidden" id="roleSection">
      <h3>Reveal Roles</h3>
      <p id="turnText"></p>
      <button id="showRoleBtn">Show Role</button>
      <div id="roleCard"></div>
      <button id="nextPlayerBtn" class="hidden">Next Player</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
